<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Bank | Send Notification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root{
            --bg-primary:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            --bg-card:rgba(255,255,255,.05);
            --border-color:rgba(255,255,255,.1);
            --text-main:#fff;
            --text-sec:rgba(255,255,255,.7);
            --accent:#0ea5e9;
            --accent-grad:linear-gradient(135deg,#0ea5e9,#2563eb);
            --input-bg:rgba(0,0,0,.25);
        }
        body.light-mode{
            --bg-primary:linear-gradient(135deg,#f0f4ff,#e0f2fe,#e0e7ff);
            --bg-card:rgba(255,255,255,.85);
            --border-color:rgba(255,255,255,.6);
            --text-main:#0f172a;
            --text-sec:#64748b;
            --input-bg:#fff;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
        body{background:var(--bg-primary);min-height:100vh;color:var(--text-main);padding:40px}

        .container{max-width:900px;margin:auto}

        .header{
            background:var(--bg-card);
            border:1px solid var(--border-color);
            backdrop-filter:blur(15px);
            border-radius:18px;
            padding:20px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }
        .btn-back{
            background:none;border:1px solid var(--border-color);
            color:var(--text-main);
            padding:8px 16px;border-radius:8px;cursor:pointer;
        }
        .btn-back:hover{border-color:var(--accent)}

        .card{
            background:var(--bg-card);
            border:1px solid var(--border-color);
            border-radius:20px;
            padding:25px;
            backdrop-filter:blur(18px);
        }

        .user-box{
            border:1px solid var(--border-color);
            border-radius:14px;
            max-height:260px;
            overflow-y:auto;
            margin-bottom:15px;
        }

        .user-row{
            display:flex;gap:12px;align-items:center;
            padding:12px;border-bottom:1px solid var(--border-color);
        }
        .user-row:last-child{border-bottom:none}

        textarea{
            width:100%;margin-top:12px;
            padding:14px;border-radius:12px;
            border:1px solid var(--border-color);
            background:var(--input-bg);color:var(--text-main);
        }

        .btn{
            margin-top:15px;
            background:var(--accent-grad);
            border:none;padding:12px 28px;
            border-radius:12px;color:#fff;font-weight:600;
            cursor:pointer;float:right;
        }

        .theme-btn{
            position:fixed;bottom:30px;right:30px;
            width:45px;height:45px;border-radius:50%;
            background:var(--bg-card);
            border:1px solid var(--border-color);
            cursor:pointer;font-size:20px;
        }

        /* TOAST */
        .toast{
            position:fixed;top:30px;right:30px;
            padding:14px 20px;border-radius:14px;
            font-weight:600;display:none;z-index:2000;
        }
        .toast.success{background:#10b981;color:#fff}
        .toast.error{background:#ef4444;color:#fff}
    </style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-paper-plane"></i> Send Notification</h2>
        <button class="btn-back" onclick="location.href='admin-dashboard.html'">← Back</button>
    </div>

    <div class="card">
        <label style="display:flex;gap:10px;align-items:center;margin-bottom:15px">
            <input type="checkbox" id="sendAll"> Send to ALL users
        </label>

        <div class="user-box" id="userBox">
            <p style="padding:20px;text-align:center;color:var(--text-sec)">Loading users...</p>
        </div>

        <textarea id="message" rows="4" placeholder="Type notification message..."></textarea>

        <button class="btn" onclick="sendNotification()">Send</button>
        <div style="clear:both"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const API = window.location.origin;
    const ADMIN_ACC = localStorage.getItem("adminAccount");

    (function authCheck(){
        if(!ADMIN_ACC) location.href="admin-login.html";
    })();

    function toggleTheme(){
        document.body.classList.toggle("light-mode");
        localStorage.setItem("theme",
            document.body.classList.contains("light-mode")?"light":"dark"
        );
    }
    if(localStorage.getItem("theme")==="light") document.body.classList.add("light-mode");

    function showToast(msg,type="success"){
        const t=document.getElementById("toast");
        t.className=`toast ${type}`;
        t.innerText=msg;
        t.style.display="block";
        setTimeout(()=>t.style.display="none",3000);
    }

    let users=[];

    async function loadUsers(){
        try{
            const res=await fetch(`${API}/all-users`);
            users=await res.json();
            userBox.innerHTML=users.map(u=>`
                <div class="user-row">
                    <input type="checkbox" class="userCheck" value="${u.accountNumber}">
                    <div>
                        <b>${u.name}</b>
                        <div style="font-size:12px;color:var(--text-sec)">Acc: ${u.accountNumber}</div>
                    </div>
                </div>
            `).join("");
        }catch{
            userBox.innerHTML="<p style='padding:20px;text-align:center'>Failed to load users</p>";
        }
    }

    sendAll.onchange=()=>{
        document.querySelectorAll(".userCheck").forEach(cb=>{
            cb.checked=false;
            cb.disabled=sendAll.checked;
        });
    };

    async function sendNotification(){
        const msg=message.value.trim();
        if(!msg){ showToast("Message required","error"); return; }

        let payload={ message:msg };

        if(sendAll.checked){
            payload.target="ALL";
        }else{
            const selected=[...document.querySelectorAll(".userCheck:checked")].map(c=>c.value);
            if(!selected.length){ showToast("Select at least one user","error"); return; }
            payload.target="SELECTED";
            payload.accounts=selected;
        }

        try{
            const res=await fetch(`${API}/admin/notify`,{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "X-ADMIN-ACC": ADMIN_ACC
                },
                body:JSON.stringify(payload)
            });

            const txt=await res.text();
            if(!res.ok){ showToast(txt||"Failed","error"); return; }

            showToast("Notification sent successfully");
            message.value="";
            sendAll.checked=false;
            loadUsers();

        }catch{
            showToast("Server error","error");
        }
    }

    loadUsers();
</script>
</body>
</html>
