<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Bank | Help Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root{ --bg-primary:linear-gradient(135deg,#0f0c29,#302b63,#24243e); --bg-card:rgba(255,255,255,.08); --border-color:rgba(255,255,255,.15); --text-main:#fff; --text-sec:rgba(255,255,255,.7); --accent-grad:linear-gradient(135deg,#667eea,#764ba2); --input-bg:rgba(0,0,0,.25); --modal-bg:rgba(20,20,40,.96); }
        body.light-mode{ --bg-primary:linear-gradient(135deg,#f0f4ff,#f5f3ff,#fae8ff); --bg-card:#ffffff; --border-color:rgba(102,126,234,.25); --text-main:#1e1b4b; --text-sec:#64748b; --input-bg:#ffffff; --modal-bg:#ffffff; }
        *{ margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI",sans-serif }
        body{ background:var(--bg-primary); min-height:100vh; color:var(--text-main) }
        .hero{ text-align:center; padding:45px 20px } .hero h1{ font-size:34px; margin-bottom:8px } .hero p{ color:var(--text-sec) }
        .container{ max-width:820px; margin:auto; padding:20px }
        .card{ background:var(--bg-card); border:1px solid var(--border-color); border-radius:18px; padding:30px; backdrop-filter:blur(15px); }
        input,select,textarea{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--border-color); background:var(--input-bg); color:var(--text-main); }
        select option{ background:var(--modal-bg); color:var(--text-main); }
        label{ font-size:13px; color:var(--text-sec); margin-bottom:6px; display:block }
        .btn{ background:var(--accent-grad); color:#fff; border:none; padding:12px 26px; border-radius:10px; cursor:pointer; font-weight:600; }
        .issue-card{ background:var(--bg-card); border:1px solid var(--border-color); border-radius:14px; padding:18px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; cursor:pointer; }
        .status{ padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700; }
        .status.OPEN{ background:#10b981; color:#fff; } .status.CLOSED{ background:#64748b; color:#fff; }
        .theme-btn{ position:fixed; bottom:25px; right:25px; width:44px; height:44px; border-radius:50%; background:var(--bg-card); border:1px solid var(--border-color); cursor:pointer; font-size:20px; }
        .modal{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-box{ width:100%; max-width:520px; background:var(--modal-bg); border:1px solid var(--border-color); border-radius:18px; padding:25px; }
        .chat{ margin-top:15px; display:flex; flex-direction:column; gap:6px; }
        .bubble{ padding:10px 14px; max-width:75%; font-size:14px; line-height:1.45; position:relative; word-wrap:break-word; border-radius:16px; }
        .user-bubble{ align-self:flex-end; background:#2563eb; color:#fff; border-radius:16px 16px 6px 16px; }
        .admin-bubble{ align-self:flex-start; background:#16a34a; color:#fff; border-radius:16px 16px 16px 6px; }
        .waiting{ align-self:flex-start; background:#475569; color:#fff; padding:10px 14px; border-radius:12px; font-size:13px; font-weight:600; }
    </style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="hero">
    <h1><i class="fas fa-life-ring"></i> Help Center</h1>
    <p>We are here to assist you with any banking issues.</p>

    <a id="backLink" href="home.html" style="color:var(--text-sec)">← Home</a>
</div>

<div class="container">
    <div class="card" id="guestVerifyCard" style="display:none">
        <h3>Verify Your Account</h3>
        <label>Account Number</label>
        <input id="guestAcc" placeholder="NBXXXXX">
        <label>Username</label>
        <input id="guestUser" placeholder="Your username">
        <br><br>
        <button class="btn" onclick="verifyGuestUI()">Verify & Continue</button>
    </div>

    <div class="card" id="ticketCard">
        <h3>Raise New Ticket</h3>
        <label>Issue Type</label>
        <select id="issueType">
            <option value="" disabled selected>Select issue type</option>
            <option>Transaction Failed</option>
            <option>Login Issue</option>
            <option>Profile Update</option>
            <option>Other</option>
        </select>
        <label>Subject</label>
        <input id="subject">
        <label>Description</label>
        <textarea id="desc"></textarea>
        <br><br>
        <button class="btn" id="submitBtn" onclick="submitTicket()">Submit Ticket</button>
    </div>

    <br>
    <div id="ticketSection">
        <h3>Your Tickets</h3>
        <br>
        <div id="ticketList"></div>
    </div>
</div>

<div class="modal" id="ticketModal">
    <div class="modal-box">
        <h3 id="modalSubject"></h3>
        <p style="color:var(--text-sec);font-size:13px" id="modalMeta"></p>
        <div class="chat">
            <div class="bubble user-bubble" id="userBubble"></div>
            <div class="bubble admin-bubble" id="adminBubble" style="display:none"></div>
            <div class="bubble waiting" id="waitingBubble" style="display:none">⏳ Waiting for admin reply...</div>
        </div>
        <br>
        <button class="btn" onclick="closeModal()">Close</button>
    </div>
</div>

<div id="toast" style="position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); color:#fff; padding:12px 18px; border-radius:10px; display:none; font-size:14px; z-index:2000;"></div>

<script>
    const API = window.location.origin;

    // GLOBAL STATE
    let accountNumber = localStorage.getItem("accountNumber");
    let isGuestSession = false;

    // ELEMENTS
    const guestCard = document.getElementById("guestVerifyCard");
    const ticketCard = document.getElementById("ticketCard");
    const ticketSection = document.getElementById("ticketSection");
    const ticketList = document.getElementById("ticketList");
    const backLink = document.getElementById("backLink"); // New Reference

    function handleAuthError(res) {
        if (res.status === 401 || res.status === 403) {
            localStorage.clear();
            sessionStorage.clear();
            showToast("Session expired. Please log in again.", true);
            setTimeout(() => {
                location.href = "home.html";
            }, 1500);
            return true;
        }
        return false;
    }

    // INITIALIZATION
    function initPage() {
        const navEntry = performance.getEntriesByType("navigation")[0];
        const isReloadOrBack = navEntry && (navEntry.type === 'reload' || navEntry.type === 'back_forward');

        if (!accountNumber && !isReloadOrBack) {
            localStorage.removeItem("guestVerified");
            localStorage.removeItem("guestAccount");
        }

        const guestVerified = localStorage.getItem("guestVerified") === "true";
        const guestAcc = localStorage.getItem("guestAccount");

        if (accountNumber) {
            // CASE 1: LOGGED IN USER
            isGuestSession = false;

            // CHANGE 2: Update Link to Dashboard
            backLink.href = "user-dashboard.html";
            backLink.innerHTML = "← Dashboard";

            showMainUI();
        } else if (guestVerified && guestAcc) {
            // CASE 2: VERIFIED GUEST
            accountNumber = guestAcc;
            isGuestSession = true;

            // Guest should go to Home, not Dashboard
            backLink.href = "home.html";
            backLink.innerHTML = "← Home";

            showMainUI();
        } else {
            // CASE 3: UNVERIFIED GUEST
            showVerifyUI();
        }
    }

    function showMainUI() {
        guestCard.style.display = "none";
        ticketCard.style.display = "block";
        ticketSection.style.display = "block";
        loadTickets();
    }

    function showVerifyUI() {
        guestCard.style.display = "block";
        ticketCard.style.display = "none";
        ticketSection.style.display = "none";
    }

    async function verifyGuestUI() {
        const acc = document.getElementById("guestAcc").value.trim();
        const user = document.getElementById("guestUser").value.trim();

        if (!acc || !user) { showToast("Account Number aur Username zaruri hai", true); return; }

        try {
            const res = await fetch(`${API}/support/verify`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ accountNumber: acc, username: user })
            });
            if (handleAuthError(res)) return;
            const msg = await res.text();

            if (msg === "Verified Successfully") {
                localStorage.setItem("guestVerified", "true");
                localStorage.setItem("guestAccount", acc);
                accountNumber = acc;
                isGuestSession = true;

                // Keep link as Home for guests
                backLink.href = "home.html";
                backLink.innerHTML = "← Home";

                showMainUI();
                showToast(msg);
            } else {
                showToast(msg, true);
            }
        } catch (err) {
            showToast("Server connection error!", true);
        }
    }

    async function submitTicket() {
        const type = document.getElementById("issueType").value;
        const sub = document.getElementById("subject").value.trim();
        const dsc = document.getElementById("desc").value.trim();
        const btn = document.getElementById("submitBtn");

        if (!type || !sub || !dsc) { showToast("Please fill in all required details"
, true); return; }

        btn.disabled = true;
        try {
            const res = await fetch(`${API}/support/raise`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    accountNumber: accountNumber,
                    issueType: type,
                    subject: sub,
                    description: dsc
                })
            });
            if (handleAuthError(res)) return;
            const msg = await res.text();

            if (msg === "Ticket Raised Successfully") {
                showToast(msg);

                document.getElementById("subject").value = "";
                document.getElementById("desc").value = "";
                document.getElementById("issueType").value = "";

                if (isGuestSession) {
                    localStorage.removeItem("guestVerified");
                    localStorage.removeItem("guestAccount");
                    setTimeout(() => { location.reload(); }, 2000);
                } else {
                    loadTickets();
                }
            } else {
                showToast(msg, true);
            }
        } catch (err) {
            showToast("Server error!", true);
        } finally {
            btn.disabled = false;
        }
    }

    async function loadTickets() {
        if (!accountNumber) return;
        try {
            const res = await fetch(`${API}/support/list/${accountNumber}`);
            if (handleAuthError(res)) return;
            if (!res.ok) throw new Error("Failed");
            const data = await res.json();

            ticketList.innerHTML = "";
            if (data.length === 0) {
                ticketList.innerHTML = `<p style="color:var(--text-sec)">No tickets raised yet</p>`;
                return;
            }
            data.forEach(t => {
                const d = document.createElement("div");
                d.className = "issue-card";
                d.onclick = () => openModal(t);
                d.innerHTML = `<div><div style="font-weight:bold">${t.subject}</div><div style="font-size:12px; opacity:0.7">${t.issueType}</div></div><span class="status ${t.status}">${t.status}</span>`;
                ticketList.appendChild(d);
            });
        } catch (err) { ticketList.innerHTML = `<p style="color:var(--text-sec)">Unable to load tickets</p>`; }
    }

    function openModal(t) {
        document.getElementById("modalSubject").innerText = t.subject;
        document.getElementById("modalMeta").innerText = t.issueType + " • " + (t.queryDate ? new Date(t.queryDate).toLocaleString() : 'Just now');
        document.getElementById("userBubble").innerText = t.description;

        const adminBubble = document.getElementById("adminBubble");
        const waitingBubble = document.getElementById("waitingBubble");

        if (t.adminReply) {
            adminBubble.style.display = "block";
            adminBubble.innerText = t.adminReply;
            waitingBubble.style.display = "none";
        } else {
            adminBubble.style.display = "none";
            waitingBubble.style.display = "block";
        }
        document.getElementById("ticketModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("ticketModal").style.display = "none"; }
    function showToast(msg, isError = false) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.background = isError ? "linear-gradient(135deg,#ef4444,#dc2626)" : "linear-gradient(135deg,#16a34a,#22c55e)";
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 3000);
    }
    function toggleTheme() {
        document.body.classList.toggle("light-mode");
        const isLight = document.body.classList.contains("light-mode");
        localStorage.setItem("theme", isLight ? "light" : "dark");
        document.querySelector(".theme-btn").textContent = isLight ? "☀️" : "🌙";
    }

    window.onload = () => {
        if (localStorage.getItem("theme") === "light") {
            document.body.classList.add("light-mode");
            document.querySelector(".theme-btn").textContent = "☀️";
        }
        initPage();
    };
</script>

</body>
</html>
